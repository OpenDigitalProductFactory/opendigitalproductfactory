name: dpf

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dpf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dpf_dev}
      POSTGRES_DB: dpf
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dpf}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/dpf_dev_password}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── AI Inference ────────────────────────────────────────────────────────────
  # Docker Model Runner (built into Docker Desktop 4.40+) provides local LLM
  # inference via OpenAI-compatible API at http://model-runner.docker.internal/v1.
  # No separate container needed — models are managed through Docker Desktop.
  # To pull a model:  docker model pull ai/llama3.2:1B-Q8_0
  # To list models:   docker model list

  portal-init:
    build:
      context: .
      target: runner
    command: ["/docker-entrypoint.sh"]
    volumes:
      - dpf-source-code:/workspace
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://dpf:dpf_dev@postgres:5432/dpf}
      DPF_HOST_PROFILE: ${DPF_HOST_PROFILE:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
    depends_on:
      postgres:
        condition: service_healthy

  portal:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "1455:3000"  # OpenAI Codex OAuth callback (shared client requires this port)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dpf-source-code:/workspace
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://dpf:dpf_dev@postgres:5432/dpf}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set - run scripts/setup.ps1 or scripts/setup.sh first}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY must be set - run scripts/setup.ps1 or scripts/setup.sh first}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      QDRANT_INTERNAL_URL: ${QDRANT_INTERNAL_URL:-http://qdrant:6333}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://model-runner.docker.internal/v1}
      DEPLOYED_VERSION: ${DEPLOYED_VERSION:-}
      DPF_ENVIRONMENT: production
      DPF_HOST_INSTALL_PATH: ${DPF_HOST_INSTALL_PATH:-}
      INSTANCE_TYPE: dev
      PROJECT_ROOT: /workspace
      SANDBOX_PREVIEW_URL: http://sandbox:3000
    depends_on:
      portal-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Sandbox Pool (concurrent build environments for Build Studio) ──────
  # Pool of N sandbox containers, each with its own workspace volume.
  # Pool size configurable via DPF_SANDBOX_POOL_SIZE env (default: 3).
  # Legacy dpf-sandbox-1 on port 3035 remains as fallback.
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    restart: unless-stopped
    ports:
      - "3035:3000"
    volumes:
      - sandbox_workspace:/workspace
    depends_on:
      portal-init:
        condition: service_completed_successfully
    command: ["sleep", "infinity"]

  sandbox-2:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    restart: unless-stopped
    ports:
      - "3037:3000"
    volumes:
      - sandbox_workspace_2:/workspace
    depends_on:
      portal-init:
        condition: service_completed_successfully
    command: ["sleep", "infinity"]

  sandbox-3:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    restart: unless-stopped
    ports:
      - "3038:3000"
    volumes:
      - sandbox_workspace_3:/workspace
    depends_on:
      portal-init:
        condition: service_completed_successfully
    command: ["sleep", "infinity"]

  # ─── Promoter (autonomous deployment pipeline) ─────────────────────────
  # One-shot container that builds new portal images from sandbox source.
  # Triggered by: execute_promotion MCP tool or operator "Deploy" button.
  # Not started by default (profiles: promote).
  promoter:
    build:
      context: .
      dockerfile: Dockerfile.promoter
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backups:/backups
      - .:/host-source:ro  # Host project source for building new portal images
    environment:
      DPF_PRODUCTION_DB_CONTAINER: dpf-postgres-1
      DPF_PORTAL_CONTAINER: dpf-portal-1
      DPF_COMPOSE_PROJECT: dpf
      POSTGRES_USER: ${POSTGRES_USER:-dpf}
      POSTGRES_DB: dpf
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["promote"]
    restart: "no"

  # ─── Playwright (UX test runner for Build Studio) ──────────────────────
  playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    volumes:
      - playwright_scripts:/scripts
      - playwright_results:/results
    network_mode: host  # Access sandbox containers on mapped ports
    profiles: ["build-images"]
    command: ["sleep", "infinity"]  # Kept alive, tests executed on demand

  # ─── Dev Environment (isolated databases for development) ──────────────────
  dev-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      POSTGRES_USER: dpf
      POSTGRES_PASSWORD: dpf_dev
      POSTGRES_DB: dpf
    ports:
      - "5433:5432"
    volumes:
      - dev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dpf"]
      interval: 5s
      timeout: 5s
      retries: 5

  dev-neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      NEO4J_AUTH: neo4j/dpf_dev_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - dev_neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  dev-qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    profiles: ["dev"]
    volumes:
      - dev_qdrant_data:/qdrant/storage
    ports:
      - "6334:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  dev-init:
    build:
      context: .
      target: dev
    profiles: ["dev"]
    command: ["sh", "-c", "pnpm install --frozen-lockfile && pnpm --filter @dpf/db exec prisma generate && pnpm --filter @dpf/db exec prisma migrate deploy && pnpm --filter @dpf/db exec tsx src/sanitized-clone.ts"]
    environment:
      CI: "true"
      DATABASE_URL: postgresql://dpf:dpf_dev@dev-postgres:5432/dpf
      PRODUCTION_DATABASE_URL: postgresql://dpf:dpf_dev@postgres:5432/dpf
      NEO4J_URI: bolt://dev-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: dpf_dev_password
      PRODUCTION_NEO4J_URI: bolt://neo4j:7687
      DPF_ENVIRONMENT: dev
    volumes:
      - .:/workspace
      - dev_node_modules:/workspace/node_modules
    depends_on:
      dev-postgres:
        condition: service_healthy
      dev-neo4j:
        condition: service_healthy
      dev-qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy

  dev-portal:
    build:
      context: .
      target: dev
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "3001:3000"
    volumes:
      - .:/workspace
      - dev_node_modules:/workspace/node_modules
    environment:
      DATABASE_URL: postgresql://dpf:dpf_dev@dev-postgres:5432/dpf
      NEO4J_URI: bolt://dev-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: dpf_dev_password
      QDRANT_INTERNAL_URL: http://dev-qdrant:6333
      LLM_BASE_URL: ${LLM_BASE_URL:-http://model-runner.docker.internal/v1}
      DPF_ENVIRONMENT: dev
      AUTH_SECRET: dev_secret_change_me
      AUTH_TRUST_HOST: "true"
      CREDENTIAL_ENCRYPTION_KEY: dev_only_key_not_for_production_0000
    depends_on:
      dev-init:
        condition: service_completed_successfully

volumes:
  pgdata:
  neo4jdata:
  qdrant_data:
  dpf-source-code:
  playwright_scripts:
  playwright_results:
  dev_pgdata:
  dev_neo4jdata:
  dev_qdrant_data:
  dev_node_modules:
  sandbox_workspace:
  sandbox_workspace_2:
  sandbox_workspace_3:
