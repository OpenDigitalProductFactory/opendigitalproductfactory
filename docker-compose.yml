name: dpf

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dpf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dpf_dev}
      POSTGRES_DB: dpf
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-inngest-db.sh:/docker-entrypoint-initdb.d/20-create-inngest-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dpf}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/dpf_dev_password}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── AI Inference ────────────────────────────────────────────────────────────
  # Docker Model Runner (built into Docker Desktop 4.40+) provides local LLM
  # inference via OpenAI-compatible API at http://model-runner.docker.internal/v1.
  # No separate container needed — models are managed through Docker Desktop.
  # To pull a model:  docker model pull ai/gemma4
  # To list models:   docker model list

  portal-init:
    build:
      context: .
      target: runner
    command: ["/docker-entrypoint.sh"]
    volumes:
      - dpf-source-code:/workspace
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://dpf:dpf_dev@postgres:5432/dpf}
      DPF_HOST_PROFILE: ${DPF_HOST_PROFILE:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
    depends_on:
      postgres:
        condition: service_healthy

  # Production-served runtime for the real install. Keep localhost:3000 reserved
  # for this surface so customer-zero verification always targets the live path.
  portal:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "1455:3000"  # OpenAI Codex OAuth callback (shared client requires this port)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dpf-source-code:/workspace
      - sandbox_workspace:/sandbox-workspace
      # browser-use writes UX verification screenshots here; the portal serves
      # them through /api/build/<buildId>/evidence/<fileName> (auth-gated).
      # Read-only from the portal's side — only browser-use should write.
      - browser_evidence:/evidence:ro
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://dpf:dpf_dev@postgres:5432/dpf}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set - run scripts/setup.ps1 or scripts/setup.sh first}
      # AUTH_TRUST_HOST tells Auth.js to trust the request's Host /
      # X-Forwarded-Host header so callbacks resolve to whatever URL the
      # browser used (localhost, LAN IP, dpf.local, public domain). No
      # hardcoded URL — the portal works in all three modes (localhost,
      # LAN with mDNS, public with reverse proxy) without env edits.
      # Optional override: PUBLIC_URL — required only for outbound async
      # flows (emails, webhooks) where there's no in-flight request.
      AUTH_TRUST_HOST: "true"
      PUBLIC_URL: ${PUBLIC_URL:-}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY must be set - run scripts/setup.ps1 or scripts/setup.sh first}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-dpf_dev_password}
      QDRANT_INTERNAL_URL: ${QDRANT_INTERNAL_URL:-http://qdrant:6333}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://model-runner.docker.internal/v1}
      DEPLOYED_VERSION: ${DEPLOYED_VERSION:-}
      DPF_ENVIRONMENT: production
      DPF_HOST_INSTALL_PATH: ${DPF_HOST_INSTALL_PATH:-}
      INSTANCE_TYPE: dev
      PROJECT_ROOT: /workspace
      SANDBOX_PREVIEW_URL: http://sandbox:3000
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      HIVE_CONTRIBUTION_TOKEN: ${HIVE_CONTRIBUTION_TOKEN:-}
      HIVE_OPS_TOKEN: ${HIVE_OPS_TOKEN:-}
      INNGEST_BASE_URL: http://inngest:8288
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-deadbeefcafebabe}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:-abcdef0123456789}
      INNGEST_DEV: ${INNGEST_DEV:-0}
      # Tell Inngest's serve() the externally-reachable URL for this app so
      # sync registrations announce the Docker-DNS hostname (not the Host
      # header of the /api/inngest PUT, which would be "localhost:3000"
      # when the instrumentation hook self-syncs from inside the container).
      # Without this, Inngest records the app URL as localhost:3000, then
      # retries forever against itself when dispatching queued steps —
      # symptom: events publish + initialize but never execute, UI hangs.
      INNGEST_SERVE_HOST: http://portal:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"   # ensures host reachable on all platforms
    depends_on:
      portal-init:
        condition: service_completed_successfully
      inngest:
        condition: service_healthy
      browser-use:
        condition: service_healthy
      adp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Sandbox Database (isolated from production) ────────────────────────
  sandbox-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dpf
      POSTGRES_PASSWORD: dpf_sandbox
      POSTGRES_DB: dpf
    volumes:
      - sandbox_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dpf"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Sandbox Init (migrations on sandbox DB) ──────────────────────────
  sandbox-init:
    build:
      context: .
      target: runner
    command: ["/docker-entrypoint.sh"]
    environment:
      DATABASE_URL: postgresql://dpf:dpf_sandbox@sandbox-postgres:5432/dpf
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
    volumes:
      - sandbox_workspace:/workspace
    depends_on:
      sandbox-postgres:
        condition: service_healthy

  # ─── Sandbox Pool (concurrent build environments for Build Studio) ──────
  # Pool of N sandbox containers, each with its own workspace volume.
  # Pool size configurable via DPF_SANDBOX_POOL_SIZE env (default: 3).
  # Legacy dpf-sandbox-1 on port 3035 remains as fallback.
  # This is the isolated build/runtime surface, not the production-served app.
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    restart: unless-stopped
    ports:
      - "3035:3000"
    volumes:
      - sandbox_workspace:/workspace
    environment:
      DATABASE_URL: postgresql://dpf:dpf_sandbox@sandbox-postgres:5432/dpf
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set}
      AUTH_TRUST_HOST: "true"
      APP_URL: http://localhost:3035
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j/dpf_dev}
      QDRANT_INTERNAL_URL: http://qdrant:6333
      NODE_ENV: development
      DPF_ENVIRONMENT: sandbox
    depends_on:
      sandbox-init:
        condition: service_completed_successfully


  # ─── Promoter (autonomous deployment pipeline) ─────────────────────────
  # One-shot container that builds new portal images from sandbox source.
  # Triggered by: execute_promotion MCP tool or operator "Deploy" button.
  # Not started by default (profiles: promote).
  promoter:
    build:
      context: .
      dockerfile: Dockerfile.promoter
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backups:/backups
      - .:/host-source:ro  # Host project source for building new portal images
    environment:
      DPF_PRODUCTION_DB_CONTAINER: dpf-postgres-1
      DPF_PORTAL_CONTAINER: dpf-portal-1
      DPF_COMPOSE_PROJECT: dpf
      POSTGRES_USER: ${POSTGRES_USER:-dpf}
      POSTGRES_DB: dpf
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["promote"]
    restart: "no"

  # ─── Browser-Use (AI-powered browser automation, replaces Playwright) ──
  # Core service — review-phase UX verification depends on it. Kept always-on
  # in the default stack; the portal waits for its healthcheck before
  # accepting traffic so run_ux_test calls never hit a cold target.
  browser-use:
    build:
      context: ./services/browser-use
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8500:8500"
    volumes:
      - browser_evidence:/evidence
    environment:
      LLM_BASE_URL: ${LLM_BASE_URL:-http://model-runner.docker.internal/v1}
      LLM_MODEL: ${BROWSER_USE_MODEL:-gpt-4o}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-not-needed-for-local}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PORT: "8500"
      SESSION_TIMEOUT_SECONDS: "600"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  adp:
    build:
      context: .
      dockerfile: services/adp/Dockerfile
    restart: unless-stopped
    ports:
      - "8600:8600"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://dpf:dpf_dev@postgres:5432/dpf}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      PORT: "8600"
      ADP_API_BASE_URL: ${ADP_API_BASE_URL:-}
      ADP_TOKEN_ENDPOINT_URL: ${ADP_TOKEN_ENDPOINT_URL:-}
      DPF_INTEGRATION_TEST_SESSION_ID: ${DPF_INTEGRATION_TEST_SESSION_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:8600/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  integration-test-harness:
    build:
      context: .
      dockerfile: services/integration-test-harness/Dockerfile
    restart: unless-stopped
    profiles: ["integration-test"]
    ports:
      - "8700:8700"
    environment:
      PORT: "8700"
      HARNESS_TEST_MODE: ${HARNESS_TEST_MODE:-1}
      HARNESS_CONTROL_TOKEN: ${HARNESS_CONTROL_TOKEN:-integration-test-token}
      HARNESS_ADMIN_LOG_PATH: ${HARNESS_ADMIN_LOG_PATH:-/tmp/harness-admin-events.ndjson}
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:8700/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Dev Environment (isolated databases for development) ──────────────────
  dev-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      POSTGRES_USER: dpf
      POSTGRES_PASSWORD: dpf_dev
      POSTGRES_DB: dpf
    ports:
      - "5433:5432"
    volumes:
      - dev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dpf"]
      interval: 5s
      timeout: 5s
      retries: 5

  dev-neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      NEO4J_AUTH: neo4j/dpf_dev_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - dev_neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  dev-qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    profiles: ["dev"]
    volumes:
      - dev_qdrant_data:/qdrant/storage
    ports:
      - "6334:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  dev-init:
    build:
      context: .
      target: dev
    profiles: ["dev"]
    command: ["sh", "-c", "pnpm install --frozen-lockfile && pnpm --filter @dpf/db exec prisma generate && pnpm --filter @dpf/db exec prisma migrate deploy && pnpm --filter @dpf/db exec tsx src/sanitized-clone.ts"]
    environment:
      CI: "true"
      DATABASE_URL: postgresql://dpf:dpf_dev@dev-postgres:5432/dpf
      PRODUCTION_DATABASE_URL: postgresql://dpf:dpf_dev@postgres:5432/dpf
      NEO4J_URI: bolt://dev-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: dpf_dev_password
      PRODUCTION_NEO4J_URI: bolt://neo4j:7687
      DPF_ENVIRONMENT: dev
    volumes:
      - .:/workspace
      - dev_node_modules:/workspace/node_modules
    depends_on:
      dev-postgres:
        condition: service_healthy
      dev-neo4j:
        condition: service_healthy
      dev-qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # Developer runtime surface. Use localhost:3001 for local non-production app
  # work so localhost:3000 remains the production-served portal.
  dev-portal:
    build:
      context: .
      target: dev
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "3001:3000"
    volumes:
      - .:/workspace
      - dev_node_modules:/workspace/node_modules
    environment:
      DATABASE_URL: postgresql://dpf:dpf_dev@dev-postgres:5432/dpf
      NEO4J_URI: bolt://dev-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: dpf_dev_password
      QDRANT_INTERNAL_URL: http://dev-qdrant:6333
      LLM_BASE_URL: ${LLM_BASE_URL:-http://model-runner.docker.internal/v1}
      DPF_ENVIRONMENT: dev
      AUTH_SECRET: dev_secret_change_me
      AUTH_TRUST_HOST: "true"
      CREDENTIAL_ENCRYPTION_KEY: dev_only_key_not_for_production_0000
    depends_on:
      dev-init:
        condition: service_completed_successfully

  # ─── Monitoring Stack ─────────────────────────────────────────────────────
  # Headless infrastructure: feeds the platform's System Health dashboard,
  # alert pipeline, and AI Coworker health indicators. Starts by default.
  # Grafana (power-user tool) available at :3002.

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-dpf_monitor}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/dpf-overview.json
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    privileged: true

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    ports:
      - "9100:9100"
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-dpf}:${POSTGRES_PASSWORD:-dpf_dev}@postgres:5432/dpf?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Durable Execution (Inngest + Redis) ──────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s

  inngest:
    image: inngest/inngest:latest
    command: "inngest start"
    ports:
      - "8288:8288"
      - "8289:8289"
    environment:
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY:-deadbeefcafebabe}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY:-abcdef0123456789}
      - INNGEST_POSTGRES_URI=postgres://${POSTGRES_USER:-dpf}:${POSTGRES_PASSWORD:-dpf_dev}@postgres:5432/inngest
      - INNGEST_REDIS_URI=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8288/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pgdata:
  neo4jdata:
  redis_data:
  qdrant_data:
  dpf-source-code:
  browser_evidence:
  dev_pgdata:
  dev_neo4jdata:
  dev_qdrant_data:
  dev_node_modules:
  sandbox_pgdata:
  sandbox_workspace:
  prometheus_data:
  grafana_data:
