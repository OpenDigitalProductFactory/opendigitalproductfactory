global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  # ─── Infrastructure ──────────────────────────────────────────
  - job_name: "cadvisor"
    scrape_interval: 10s
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "node-exporter"
    scrape_interval: 10s
    static_configs:
      - targets: ["node-exporter:9100"]

  # ─── Databases ───────────────────────────────────────────────
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Neo4j Community Edition does not expose Prometheus metrics.
  # Neo4j Enterprise users: uncomment and add NEO4J_server_metrics_prometheus_enabled
  # to the neo4j service environment in docker-compose.yml.
  # - job_name: "neo4j"
  #   scrape_interval: 30s
  #   static_configs:
  #     - targets: ["neo4j:2004"]
  #   metrics_path: /metrics

  - job_name: "qdrant"
    scrape_interval: 30s
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: /metrics

  # ─── Application ────────────────────────────────────────────
  - job_name: "portal"
    static_configs:
      - targets: ["portal:3000"]
    metrics_path: /api/metrics

  - job_name: "sandbox"
    static_configs:
      - targets:
          - "sandbox:3000"
    metrics_path: /api/metrics

  # ─── AI Inference ───────────────────────────────────────────
  # Docker Model Runner does not expose a Prometheus `/metrics` endpoint
  # (all paths 404). Inference health is tracked via the portal's
  # `dpf_ai_inference_duration_seconds_*` application metrics instead.
  # If/when Model Runner ships a metrics endpoint, re-add the scrape here.

  # ─── Windows Host (real hardware via windows_exporter) ───────
  # windows_exporter runs natively on the Windows host (not in Docker).
  # Discovers real network interfaces, disk, memory — not WSL2 VM.
  - job_name: "windows-host"
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:9182"]
        labels:
          instance: "windows-host"

  # ─── Self-monitoring ────────────────────────────────────────
  - job_name: "prometheus"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:9090"]
