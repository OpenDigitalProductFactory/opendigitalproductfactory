version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Expo SDK is a lockstep upgrade: `expo` core and every `expo-*`
      # companion package must move together to the same SDK line.
      # Major-version PRs cross SDK boundaries and break the mobile
      # build. Minor/patch updates within the current SDK are fine.
      - dependency-name: "expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "expo-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@expo/*"
        update-types: ["version-update:semver-major"]
      # React Native and its ecosystem packages are version-coupled to
      # the Expo SDK line (see note above). Block major bumps for the
      # same reason.
      - dependency-name: "react-native"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-native-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@react-native/*"
        update-types: ["version-update:semver-major"]
      # React majors land across web + mobile. The mobile workspace
      # can only take React 19+ after RN 0.78+ / a matching Expo SDK
      # upgrade, so React needs to move alongside that plan, not
      # independently.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      # TypeScript majors usually surface type errors across strict
      # mode code. Upgrade deliberately, not through Dependabot.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
