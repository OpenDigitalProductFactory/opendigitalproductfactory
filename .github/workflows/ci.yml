name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.33.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @dpf/db exec prisma generate

      - name: Typecheck all workspaces
        run: pnpm typecheck

  routing-contract:
    name: Routing Tier Contract
    runs-on: ubuntu-latest
    # Merge-blocking. Locks the "right LLM for the right job" principle
    # into CI — asserts that for every task type in BUILT_IN_TASK_REQUIREMENTS,
    # routing picks a model that meets the tier floor, required capabilities,
    # and dimension thresholds. Regressions here (new model with wrong tier,
    # missing pricing seed, task requirement wrong) fail CI loudly instead
    # of silently routing trivial tasks to Opus or frontier tasks to Haiku.
    # See docs/superpowers/specs/2026-04-20-routing-architecture-current.md.
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.33.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @dpf/db exec prisma generate

      - name: Run tier-contract test
        run: pnpm --filter web exec vitest run lib/routing/tier-contract.test.ts

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    # Unit Tests runs informationally while the broken-test backlog is drained
    # (issue #104). Typecheck, Production Build, and Routing Tier Contract
    # are the binding gates. Flip this back to blocking once the suite is
    # honest again.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.33.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @dpf/db exec prisma generate

      - name: Run unit tests
        run: pnpm test

  build:
    name: Production Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.33.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @dpf/db exec prisma generate

      - name: Build web (Next.js production)
        run: pnpm --filter web build

  dockerfile-node-version:
    name: Dockerfile Node Version
    runs-on: ubuntu-latest
    # Guards against the failure mode that landed in PR for ADP: a service
    # Dockerfile pinned to an older Node major than the rest of the stack,
    # paired with a dependency (undici@8) that needs a newer one. The
    # container crash-looped on `webidl.util.markAsUncloneable is not a
    # function` and broke `docker compose up` for fresh installs. CI now
    # asserts every Dockerfile uses node:24-alpine (or newer) so this drift
    # cannot reach main again. Bump the floor here when the platform moves.
    steps:
      - uses: actions/checkout@v6

      - name: Assert all Dockerfiles target node:24-alpine or newer
        run: |
          set -euo pipefail
          floor=24
          fail=0
          while IFS= read -r -d '' file; do
            while IFS= read -r line; do
              # Match "FROM node:<major>[-...]" — capture the major version.
              if [[ "$line" =~ ^[[:space:]]*FROM[[:space:]]+node:([0-9]+) ]]; then
                major="${BASH_REMATCH[1]}"
                if (( major < floor )); then
                  echo "::error file=$file::$file uses node:$major (line: $line). Floor is node:$floor-alpine."
                  fail=1
                fi
              fi
            done < "$file"
          done < <(find . -type f \( -name 'Dockerfile' -o -name 'Dockerfile.*' \) -not -path './node_modules/*' -not -path './.git/*' -print0)
          exit $fail
